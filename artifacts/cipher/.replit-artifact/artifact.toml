kind = "web"
previewPath = "/"
title = "Cipher"
version = "1.0.0"
id = "artifacts/cipher"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23051

[services.development]
run = "pnpm --filter @workspace/cipher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cipher", "run", "build" ]
serve = "static"
publicDir = "artifacts/cipher/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23051"
BASE_PATH = "/"
